<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="stylesheet" href="../../style.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../logos/LogoNoahQuiz.ico">
    <link rel="apple-touch-icon" href="../logos/LogoNoahQuiz.png">
    <title>Noah Quiz</title>
</head>

<body>
    <div class="topo">
        <div class="numero">7</div>

        <h1 class="titulo">De que desenho é essa música?</h1>
    </div>
    <audio controls>
        <source src="../mp3/Tom-und-Jerry.mp3" type="audio/mpeg"/>
        <p>Seu navegador não suporta o elemento de áudio.</p>
    </audio>
    <div class="container">
        <button data-link="8Pergunta.html" aria-label="Resposta correta">Tom e Jerry</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Resposta incorreta">Corrida Maluca</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Resposta incorreta">Scooby-Doo</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Resposta incorreta">Popeye</button>
    </div>

    <script>
        document.querySelectorAll(".container button").forEach(btn => {
            btn.addEventListener("click", () => {
                location.href = btn.dataset.link;
            });
        });
    </script>

</body>

</html>
