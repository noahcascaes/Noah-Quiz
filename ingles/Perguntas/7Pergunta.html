<!DOCTYPE html>
<html lang="en-US">

<head>
    <link rel="stylesheet" href="../../style.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../logos/LogoNoahQuiz.ico">
    <link rel="apple-touch-icon" href="../logos/LogoNoahQuiz.png">
    <title>Noah Quiz</title>
</head>

<body>
    <div class="topo">
        <div class="numero">7</div>

        <h1 class="titulo">What cartoon is this music from?</h1>
    </div>
    <audio controls>
        <source src="../mp3/Tom-und-Jerry.mp3" type="audio/mpeg"/>
        <p>Your browser does not support the audio element.</p>
    </audio>
    <div class="container">
        <button data-link="8Pergunta.html" aria-label="Correct answer">Tom and Jerry</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Incorrect answer">Looney Tunes</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Incorrect answer">Scooby-Doo</button>
        <button data-link="../Respostas alternativas/ERRADO!.html" aria-label="Incorrect answer">Popeye</button>
    </div>

    <script>
        document.querySelectorAll(".container button").forEach(btn => {
            btn.addEventListener("click", () => {
                location.href = btn.dataset.link;
            });
        });
    </script>

</body>

</html>
