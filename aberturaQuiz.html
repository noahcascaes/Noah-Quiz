<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Noah Quiz</title>

    <link rel="icon" href="figuras/logos/LogoNoahQuiz.ico">
    <link rel="apple-touch-icon" href="figuras/logos/LogoNoahQuiz.png">

    <style>
        body {
            background-color: rgb(2, 2, 43);
            padding: 10%;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: rgb(2, 2, 43);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 20px;
            width: 250px;
        }

        button:hover {
            background-color: white;
            color: rgb(2, 2, 43);
        }

        h1 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h1>Bem-vindo ao Noah Quiz</h1>

    <div class="container">
        <button data-link="quiz.html">COMEÇAR</button>
        <button data-link="atrasDasCameras/Creditos.html">CRÉDITOS</button>
        <button data-link="Linguagens.html">LINGUAGENS</button>
        <button data-link="atrasDasCameras/sobreoautor.html">SOBRE O CRIADOR</button>
    </div>

    <script>
        document.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("click", () => {
                location.href = btn.dataset.link;
            });
        });
    </script>

</body>

</html>
